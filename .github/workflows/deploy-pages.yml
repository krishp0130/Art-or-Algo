# Build Vue app and deploy to GitHub Pages.
# Set repo variable VITE_API_BASE to your hosted Express URL for live classification.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --prefix client
      - run: npm run sync:data
      - run: npm run build --prefix client
        env:
          VITE_BASE_PATH: /Art-or-Algo/
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
